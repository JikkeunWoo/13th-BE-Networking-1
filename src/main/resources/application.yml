spring:
  application:
    name: networking2
  datasource:
    # localhost:3306 뒤의 cotato_db는 생성할 스키마 이름입니다.
    url: jdbc:mysql://localhost:3306/cotato_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update # 엔티티 기반으로 테이블 자동 생성/수정
    show-sql: true
    properties:
      hibernate:
        format_sql: true