name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout 코드를 가져옵니다.
      uses: actions/checkout@v4 # v4로 올려서 경고 해결!

    # ⭐ 추가된 핵심 단계: 깃허브 로봇에 자바 17을 설치합니다.
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # ⭐ 추가된 핵심 단계: 도커를 굽기 전에 먼저 jar 파일을 만듭니다!
    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew clean build -x test

    - name: Docker Hub 로그인
      uses: docker/login-action@v3 # v3로 올려서 경고 해결!
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Docker 이미지 빌드 및 푸시
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/cotato-app:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/cotato-app:latest

    - name: EC2에 접속해서 새 이미지로 배포
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/cotato-app:latest
          docker-compose down
          docker-compose up -d
          docker image prune -f