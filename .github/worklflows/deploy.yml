name: Deploy to EC2

on:
  push:
    branches:
      - main # main 브랜치에 푸시될 때만 실행됩니다.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout 코드를 가져옵니다.
      uses: actions/checkout@v3

    - name: Docker Hub 로그인
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Docker 이미지 빌드 및 푸시
      # 맥북(ARM)과 EC2(AMD) 아키텍처가 다르더라도, 깃허브 로봇(Ubuntu)은 EC2와 같은 환경이라 기본 빌드로 충분합니다.
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/cotato-app:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/cotato-app:latest

    - name: EC2에 접속해서 새 이미지로 컨테이너 재실행
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          # 1. 새 이미지 다운로드
          docker pull ${{ secrets.DOCKER_USERNAME }}/cotato-app:latest
          
          # 2. 기존 도커 컴포즈 종료 및 새 이미지로 재실행
          docker-compose down
          docker-compose up -d
          
          # 3. 찌꺼기 이미지 청소 (용량 확보)
          docker image prune -f