version: '3.8'

services:
  # 1. MySQL 데이터베이스 컨테이너
  mysql:
    image: mysql:8.0
    container_name: cotato-mysql
    restart: always
    environment:
      MYSQL_DATABASE: cotato_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD} # EC2 환경변수에서 읽어옴
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql # DB 데이터 영구 저장소 연결

  # 2. 스프링부트 애플리케이션 컨테이너
  app:
    image: ${DOCKER_USERNAME}/cotato-app:latest # 나중에 본인 도커허브 아이디로 바꿀 예정
    container_name: cotato-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql # 같은 docker-compose 안에 있으므로 서비스 이름으로 바로 연결됨
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - mysql

# 데이터를 날아가지 않게 잡아두는 볼륨 선언
volumes:
  mysql-data:
